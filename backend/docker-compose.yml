services:
  db:
    image: postgres:16-alpine
    container_name: forja-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: forja
    ports:
      - "5432:5432"
    volumes:
      - forja_pgdata:/var/lib/postgresql/data

volumes:
  forja_pgdata:
